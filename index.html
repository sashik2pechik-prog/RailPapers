<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RailPapers | Global Records</title>
    <style>
        /* RETRO DARK THEME */
        :root {
            --bg-main: #0a0a0c;
            --bg-panel: #141518;
            --border-color: #333;
            --text-main: #e0e0e0;
            --accent-rust: #c24a27;
            --accent-gold: #d4af37;
            --hover-bg: #1f2025;
        }

        body {
            font-family: 'Courier New', Courier, monospace; /* Old school style */
            background-color: var(--bg-main);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            line-height: 1.6;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 20px;
        }

        /* SVG ICONS (Hidden definitions) */
        .svg-defs { display: none; }

        .icon {
            width: 24px;
            height: 24px;
            fill: currentColor;
            vertical-align: middle;
            margin-right: 8px;
        }

        /* TOP NAVIGATION */
        .top-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: var(--bg-panel);
            padding: 15px 20px;
            border-bottom: 2px solid var(--accent-rust);
        }

        .logo {
            font-size: 1.8rem;
            font-weight: bold;
            color: white;
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 2px 2px 0px rgba(194, 74, 39, 0.5);
        }

        .nav-controls {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .search-input {
            background-color: var(--bg-main);
            color: white;
            border: 1px solid var(--border-color);
            padding: 10px 15px;
            border-radius: 4px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 1rem;
            width: 250px;
            transition: border-color 0.3s;
        }

        .search-input:focus {
            outline: none;
            border-color: var(--accent-gold);
        }

        .discord-btn {
            background-color: #5865F2; /* Discord Color */
            color: white;
            text-decoration: none;
            padding: 10px 20px;
            border-radius: 4px;
            font-weight: bold;
            font-family: Arial, sans-serif;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .discord-btn:hover {
            background-color: #4752c4;
        }

        /* HEADER */
        header {
            text-align: center;
            margin: 50px 0;
        }

        h1 {
            font-size: 3.5rem;
            margin: 0;
            color: var(--accent-gold);
            text-transform: uppercase;
        }

        p.subtitle {
            color: #888;
            font-size: 1.2rem;
            margin-top: 5px;
        }

        /* FILTERS (WORKING BUTTONS) */
        .filters {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 30px;
            background-color: var(--bg-panel);
            padding: 15px;
            border: 1px solid var(--border-color);
        }

        .filter-btn {
            background-color: var(--bg-main);
            color: var(--text-main);
            border: 1px solid var(--border-color);
            padding: 10px 20px;
            cursor: pointer;
            font-family: 'Courier New', Courier, monospace;
            font-size: 1rem;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
        }

        .filter-btn:hover {
            background-color: var(--hover-bg);
            border-color: var(--accent-gold);
        }

        .filter-btn.active {
            background-color: var(--accent-rust);
            color: white;
            border-color: var(--accent-rust);
        }

        /* TABLE */
        .table-container {
            overflow-x: auto;
            border: 1px solid var(--border-color);
            background-color: var(--bg-panel);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th {
            background-color: #000;
            color: var(--accent-gold);
            padding: 15px;
            border-bottom: 2px solid var(--border-color);
            text-transform: uppercase;
        }

        td {
            padding: 15px;
            border-bottom: 1px solid var(--border-color);
            vertical-align: middle;
        }

        tr:hover {
            background-color: var(--hover-bg);
        }

        /* PLAYER STYLES */
        .player-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .avatar {
            width: 45px;
            height: 45px;
            border-radius: 5px;
            border: 1px solid #555;
            background-color: #222;
        }

        .player-name {
            font-size: 1.2rem;
            font-weight: bold;
            color: white;
        }

        .wr-badge {
            background-color: var(--accent-rust);
            color: white;
            padding: 2px 6px;
            font-size: 0.75rem;
            margin-left: 10px;
            border-radius: 3px;
        }

        .time {
            font-size: 1.3rem;
            color: var(--accent-gold);
            font-weight: bold;
        }

        .proof-link {
            color: #4da6ff;
            text-decoration: none;
            font-weight: bold;
        }

        .proof-link:hover {
            text-decoration: underline;
            color: #80c1ff;
        }

        .no-results {
            text-align: center;
            padding: 30px;
            color: #888;
            font-style: italic;
            display: none;
        }
    </style>
</head>
<body>

<div class="top-nav">
    <a href="#" class="logo">RAILPAPERS</a>
    <div class="nav-controls">
        <input type="text" id="searchInput" class="search-input" placeholder="> Search player...">
        <a href="https://discord.gg/https://discord.gg/QJwPFb6PcG" target="_blank" class="discord-btn">
            <svg class="icon"><use href="#icon-discord"></use></svg> DISCORD
        </a>
    </div>
</div>

<div class="container">
    <header>
        <h1>Global Leaderboards</h1>
        <p class="subtitle">Dead Rails Speedrun Database</p>
    </header>

    <div class="filters" id="filterContainer">
        <button class="filter-btn active" data-filter="all">All Runs</button>
        <button class="filter-btn" data-filter="Starter Kit">
            <svg class="icon"><use href="#icon-rifle"></use></svg> Starter Kit
        </button>
        <button class="filter-btn" data-filter="Duo">
            <svg class="icon"><use href="#icon-duo"></use></svg> Duo
        </button>
        <button class="filter-btn" data-filter="Trio">
            <svg class="icon"><use href="#icon-trio"></use></svg> Trio
        </button>
        <button class="filter-btn" data-filter="No Train">
            <svg class="icon"><use href="#icon-notrain"></use></svg> No Train
        </button>
        <button class="filter-btn" data-filter="Any%">
            <svg class="icon"><use href="#icon-any"></use></svg> Any%
        </button>
        <button class="filter-btn" data-filter="Glitchless">
            <svg class="icon"><use href="#icon-glitchless"></use></svg> Glitchless
        </button>
    </div>

    <div class="table-container">
        <table id="leaderboardTable">
            <thead>
                <tr>
                    <th>Rank</th>
                    <th>Player</th>
                    <th>Time</th>
                    <th>Category</th>
                    <th>Train</th>
                    <th>Mode</th>
                    <th>Proof</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                
                <tr class="run-row" data-category="No Train" data-mode="Any%">
                    <td style="font-size: 1.5rem; font-weight: bold; color: var(--accent-rust);">1</td>
                    <td>
                        <div class="player-info">
                            <img src="https://tr.rbxcdn.com/38c6edcb50633730ff4cf39ac8859840/150/150/AvatarHeadshot/Png" alt="Avatar" class="avatar">
                            <div>
                                <span class="player-name">Luc</span>
                                <span class="wr-badge">WR</span>
                            </div>
                        </div>
                    </td>
                    <td class="time">02:53.12</td>
                    <td>
                        <svg class="icon"><use href="#icon-notrain"></use></svg> No Train
                    </td>
                    <td>None</td>
                    <td>
                        <svg class="icon"><use href="#icon-any"></use></svg> Any%
                    </td>
                    <td>
                        <a href="https://www.youtube.com/watch?v=UsbSbwVwshg" target="_blank" class="proof-link">Watch Video</a>
                    </td>
                </tr>

                </tbody>
        </table>
        <div id="noResults" class="no-results">
            [ ERROR 404: Conductor not found ]
        </div>
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        const searchInput = document.getElementById('searchInput');
        const filterBtns = document.querySelectorAll('.filter-btn');
        const tableRows = document.querySelectorAll('.run-row');
        const noResultsMessage = document.getElementById('noResults');
        const tableElement = document.getElementById('leaderboardTable');

        let currentSearch = '';
        let currentFilter = 'all';

        // Function to update the table display
        function applyFilters() {
            let visibleCount = 0;

            tableRows.forEach(row => {
                const playerName = row.querySelector('.player-name').textContent.toLowerCase();
                const category = row.getAttribute('data-category');
                const mode = row.getAttribute('data-mode');

                // Check if row matches search text
                const matchesSearch = playerName.includes(currentSearch);
                
                // Check if row matches filter button
                const matchesFilter = (currentFilter === 'all') || 
                                      (category === currentFilter) || 
                                      (mode === currentFilter);

                if (matchesSearch && matchesFilter) {
                    row.style.display = '';
                    visibleCount++;
                } else {
                    row.style.display = 'none';
                }
            });

            // Show or hide the table header and "No Results" message
            if (visibleCount === 0) {
                tableElement.style.display = 'none';
                noResultsMessage.style.display = 'block';
            } else {
                tableElement.style.display = 'table';
                noResultsMessage.style.display = 'none';
            }
        }

        // 1. Search Bar Event Listener
        searchInput.addEventListener('input', (e) => {
            currentSearch = e.target.value.toLowerCase().trim();
            applyFilters();
        });

        // 2. Filter Buttons Event Listener
        filterBtns.forEach(btn => {
            btn.addEventListener('click', (e) => {
                // Remove active class from all buttons
                filterBtns.forEach(b => b.classList.remove('active'));
                
                // Add active class to clicked button
                const clickedBtn = e.currentTarget;
                clickedBtn.classList.add('active');

                // Get filter data and apply
                currentFilter = clickedBtn.getAttribute('data-filter');
                applyFilters();
            });
        });
    });
</script>

</body>
</html>
